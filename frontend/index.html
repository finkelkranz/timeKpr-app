<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="mask-icon" href="/favicon.svg" color="#3b82f6" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="timekpr" />
    <meta name="application-name" content="timekpr Admin" />
    <meta name="description" content="Manage screen time for your family" />
    <meta name="msapplication-TileColor" content="#3b82f6" />
    <meta name="msapplication-TileImage" content="/android-chrome-192x192.png" />
    <title>timekpr Admin</title>
    <script>
      // Prevent flash of unstyled content (FOUC) for dark mode
      (function() {
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = savedTheme === 'dark' || (savedTheme !== 'light' && prefersDark);
        if (isDark) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <style>
      /* Critical CSS to prevent FOUC */
      .dark {
        color-scheme: dark;
      }
    </style>
  </head>
  <body class="no-transitions">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove no-transitions class after page load
      window.addEventListener('load', () => {
        document.body.classList.remove('no-transitions');
      });
    </script>
  </body>
</html>
